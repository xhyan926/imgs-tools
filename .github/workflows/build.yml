# GitHub Actions 工作流 - 自动构建所有平台
name: Build

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # 测试作业
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --workspace --verbose

  # 构建 CLI 工具
  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: imgconv
            asset_name: imgconv-linux-x86_64
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: imgconv.exe
            asset_name: imgconv-windows-x86_64.exe
          # macOS Intel (默认构建)
          - os: macos-13
            target: ''
            artifact_name: imgconv
            asset_name: imgconv-macos-x86_64
          # macOS ARM (需要在 ARM runner 上构建)
          - os: macos-14
            target: ''
            artifact_name: imgconv
            asset_name: imgconv-macos-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build CLI
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo build --release --target ${{ matrix.target }} -p imgconv
          else
            cargo build --release -p imgconv
          fi
        shell: bash

      - name: List build outputs
        run: |
          echo "Target directory contents:"
          ls -la target/ || true
          if [ -n "${{ matrix.target }}" ]; then
            echo "Specific target:"
            ls -la target/${{ matrix.target }}/release/ || true
          else
            echo "Default target:"
            ls -la target/release/ || true
          fi
        shell: bash

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cd target/${{ matrix.target }}/release
          else
            cd target/release
          fi
          tar czf ../../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
          ls -la ../../../../${{ matrix.asset_name }}.tar.gz
        shell: bash

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          if ('${{ matrix.target }}' -ne '') {
            cd target/${{ matrix.target }}/release
          } else {
            cd target/release
          }
          7z a ../../../../${{ matrix.asset_name }}.zip ${{ matrix.artifact_name }}
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.*
          if-no-files-found: error

  # 创建 GitHub Release
  release:
    name: Create Release
    needs: build-cli
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
