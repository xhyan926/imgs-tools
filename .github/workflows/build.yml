# GitHub Actions 工作流 - 自动构建所有平台
name: Build

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # 测试作业
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --workspace --verbose

  # 构建 CLI 工具
  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: imgconv
            asset_name: imgconv-linux-x86_64
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: imgconv.exe
            asset_name: imgconv-windows-x86_64
          # macOS x86_64
          - os: macos-latest
            target: ''
            artifact_name: imgconv
            asset_name: imgconv-macos-x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Build CLI
        run: |
          if [ "${{ matrix.target }}" != "" ]; then
            cargo build --release --target ${{ matrix.target }} -p imgconv
          else
            cargo build --release -p imgconv
          fi
        shell: bash

      - name: List build outputs
        run: |
          echo "=== Target directory ==="
          ls -la target/ || true
          if [ "${{ matrix.target }}" != "" ] && [ -d "target/${{ matrix.target }}/release" ]; then
            echo "=== Specific target release ==="
            ls -la target/${{ matrix.target }}/release/
          elif [ -d "target/release" ]; then
            echo "=== Default target release ==="
            ls -la target/release/
          fi
        shell: bash

      - name: Pack artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.target }}" != "" ] && [ -d "target/${{ matrix.target }}/release" ]; then
            echo "Packing from target/${{ matrix.target }}/release"
            tar czf ${{ matrix.asset_name }}.tar.gz -C target/${{ matrix.target }}/release ${{ matrix.artifact_name }}
          else
            echo "Packing from target/release"
            tar czf ${{ matrix.asset_name }}.tar.gz -C target/release ${{ matrix.artifact_name }}
          fi
          ls -la ${{ matrix.asset_name }}.tar.gz
        shell: bash

      - name: Pack artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          if ("${{ matrix.target }}" -ne "" -and (Test-Path "target/${{ matrix.target }}/release")) {
            Write-Host "Packing from target/${{ matrix.target }}/release"
            7z a ${{ matrix.asset_name }}.zip .\target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          } else {
            Write-Host "Packing from target/release"
            7z a ${{ matrix.asset_name }}.zip .\target\release\${{ matrix.artifact_name }}
          }
          Get-ChildItem ${{ matrix.asset_name }}.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.*
          retention-days: 7

  # 创建 GitHub Release
  release:
    name: Create Release
    needs: build-cli
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
